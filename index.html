<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Meal Planner</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2e7d52">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TripMeals">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    :root {
      --green:        #2e7d52;
      --green-hover:  #245f3f;
      --green-light:  #e8f5ee;
      --amber:        #d97706;
      --bg:           #f2ede4;
      --white:        #ffffff;
      --gray-50:      #faf8f5;
      --gray-100:     #f0ebe0;
      --gray-200:     #e2d9cb;
      --gray-400:     #a89880;
      --gray-600:     #6b5e4e;
      --gray-900:     #28201a;
      --breakfast:    #c2410c;
      --lunch:        #1d4ed8;
      --dinner:       #6d28d9;
      --r:            10px;
      --r-lg:         16px;
      --shadow:       0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--gray-900);
      min-height: 100vh;
      line-height: 1.5;
      font-size: 15px;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      background: var(--green);
      color: #fff;
      height: 54px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-btn {
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: var(--r);
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background .15s;
      white-space: nowrap;
    }
    .header-btn:hover { background: rgba(255,255,255,.25); }

    /* ── Layout ─────────────────────────────── */
    .page { display: none; }
    .page.active { display: block; }
    .container { max-width: 680px; margin: 0 auto; padding: 20px 14px; }

    /* ── Cards ──────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: var(--r-lg);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    /* ── Buttons ────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--r);
      border: none;
      cursor: pointer;
      font-size: .88rem;
      font-weight: 500;
      font-family: inherit;
      transition: all .15s;
    }
    .btn-primary   { background: var(--green); color: #fff; }
    .btn-primary:hover { background: var(--green-hover); }
    .btn-secondary { background: var(--gray-100); color: var(--gray-900); border: 1px solid var(--gray-200); }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-danger    { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm { padding: 5px 11px; font-size: .82rem; }
    .btn-x {
      background: none; border: none; cursor: pointer;
      color: var(--gray-400); font-size: .9rem;
      padding: 2px 4px; border-radius: 4px;
      transition: all .15s;
    }
    .btn-x:hover { background: #fee2e2; color: #dc2626; }

    /* ── Inputs ─────────────────────────────── */
    input[type=text], input[type=date], input[type=time], select {
      padding: 8px 11px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--r);
      font-size: .9rem;
      font-family: inherit;
      color: var(--gray-900);
      background: var(--white);
      transition: border-color .15s;
      width: 100%;
    }
    input[type=text]:focus, input[type=date]:focus,
    input[type=time]:focus, select:focus {
      outline: none;
      border-color: var(--green);
    }

    /* ── Trips list page ────────────────────── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .page-header h2 { font-size: 1.15rem; font-weight: 700; }

    .join-card {
      background: var(--white);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .join-label { font-size: .78rem; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .add-row { display: flex; gap: 7px; align-items: center; }
    .add-row input { flex: 1; }

    .trip-card {
      background: var(--white);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      margin-bottom: 9px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1.5px solid transparent;
    }
    .trip-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.1); border-color: var(--green-light); }
    .trip-card h3 { font-size: .98rem; font-weight: 600; margin-bottom: 3px; }
    .trip-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: .8rem; color: var(--gray-600); }
    .trip-arrow { color: var(--gray-400); font-size: 1.3rem; line-height: 1; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-600); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .loading { text-align: center; padding: 30px; color: var(--gray-600); font-size: .9rem; }

    /* ── Modal ──────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--r-lg);
      padding: 24px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 24px 48px rgba(0,0,0,.2);
    }
    .modal h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 18px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: .8rem; font-weight: 600; color: var(--gray-600); margin-bottom: 5px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ── Trip detail ────────────────────────── */
    .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card-row h2 { font-size: 1.2rem; font-weight: 700; }
    .trip-detail-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: .82rem; color: var(--gray-600); margin-top: 5px; }

    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 11px; }
    .section-title { font-size: .98rem; font-weight: 600; }

    /* ── Participants ───────────────────────── */
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 11px; min-height: 20px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--green-light); color: var(--green);
      border-radius: 20px; padding: 4px 10px 4px 12px;
      font-size: .83rem; font-weight: 500;
    }
    .chip-remove {
      background: none; border: none; cursor: pointer;
      color: var(--green); opacity: .55; font-size: .95rem;
      display: flex; align-items: center; padding: 0; line-height: 1;
    }
    .chip-remove:hover { opacity: 1; }
    .muted { font-size: .85rem; color: var(--gray-600); font-style: italic; }

    /* ── Day group ──────────────────────────── */
    .day-group { margin-bottom: 18px; }
    .day-label {
      font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--gray-600); padding: 0 4px; margin-bottom: 7px;
    }

    /* ── Meal card ──────────────────────────── */
    .meal-card {
      background: var(--white);
      border-radius: var(--r-lg);
      border: 1.5px solid var(--gray-200);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .meal-header {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px;
      cursor: pointer; user-select: none;
    }
    .meal-header:hover { background: var(--gray-50); }
    .badge {
      padding: 2px 9px; border-radius: 20px;
      font-size: .75rem; font-weight: 700; letter-spacing: .02em;
    }
    .badge-breakfast { background: #fff0e6; color: var(--breakfast); }
    .badge-lunch     { background: #eff6ff; color: var(--lunch); }
    .badge-dinner    { background: #f5f3ff; color: var(--dinner); }
    .meal-time { font-size: .8rem; color: var(--gray-600); }
    .meal-summary { flex: 1; font-size: .78rem; color: var(--gray-600); text-align: right; padding-right: 2px; }
    .chevron { color: var(--gray-400); font-size: .95rem; transition: transform .2s; }
    .chevron.open { transform: rotate(90deg); }

    .meal-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--gray-100); }
    .meal-body.open { display: block; }

    .meal-section { margin-top: 13px; }
    .section-label {
      font-size: .73rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--gray-600); margin-bottom: 7px;
    }

    /* ── Joiners ────────────────────────────── */
    .pills { display: flex; flex-wrap: wrap; gap: 7px; }
    .pill {
      display: inline-flex; align-items: center;
      padding: 5px 13px; border-radius: 20px;
      border: 1.5px solid var(--gray-200);
      background: var(--white); color: var(--gray-600);
      font-size: .83rem; cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .pill:hover { background: var(--gray-100); }
    .pill.active { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 600; }

    /* ── Groceries ──────────────────────────── */
    .grocery-list { list-style: none; margin-bottom: 4px; }
    .grocery-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; border-bottom: 1px solid var(--gray-100);
      font-size: .88rem;
    }
    .grocery-item:last-child { border-bottom: none; }
    .g-name { flex: 1; font-weight: 500; }
    .g-qty {
      font-size: .78rem; color: var(--gray-600);
      background: var(--gray-100); padding: 2px 8px;
      border-radius: 10px;
    }
    .input-sm { padding: 6px 9px !important; font-size: .85rem !important; }
    .input-flex { flex: 2; }
    .input-qty { flex: 1; min-width: 0; }

    /* ── Setup banner ───────────────────────── */
    .setup-banner {
      background: #fffbeb;
      border: 1.5px solid #fcd34d;
      border-radius: var(--r-lg);
      padding: 14px 16px;
      margin-bottom: 16px;
      font-size: .88rem;
      color: #92400e;
    }
    .setup-banner strong { display: block; margin-bottom: 4px; }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .trip-detail-meta { gap: 8px; }
    }

/* ── Grocery edit ───────────────────────── */
    .grocery-edit-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 0; border-bottom: 1px solid var(--gray-100);
    }
    .grocery-edit-row:last-child { border-bottom: none; }
    .btn-edit {
      background: none; border: none; cursor: pointer;
      color: var(--gray-400); font-size: .85rem;
      padding: 2px 5px; border-radius: 4px;
      transition: all .15s; line-height: 1;
    }
    .btn-edit:hover { background: var(--gray-100); color: var(--gray-900); }

    /* ── Overview card ─────────────────────── */
    .overview-type-block {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--gray-100);
    }
    .overview-type-block:last-child { border-bottom: none; margin-bottom: 0; }
    .overview-type-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .paid-row {
      display: flex; align-items: center; gap: 6px;
      font-size: .82rem; color: var(--gray-600);
    }
    .paid-input {
      width: 80px !important;
      padding: 4px 8px !important;
      font-size: .85rem !important;
      text-align: right;
    }
    /* ── Split table ────────────────────────── */
    .split-table-wrap { overflow-x: auto; margin-top: 4px; }
    .split-table {
      width: 100%; border-collapse: collapse;
      font-size: .83rem;
    }
    .split-table th {
      text-align: left; font-weight: 600;
      color: var(--gray-600); font-size: .73rem;
      text-transform: uppercase; letter-spacing: .04em;
      padding: 5px 8px; border-bottom: 1.5px solid var(--gray-200);
      white-space: nowrap;
    }
    .split-table td {
      padding: 7px 8px; border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }
    .split-table tr:last-child td { border-bottom: none; }
    .split-name { font-weight: 500; }
    .split-cell { text-align: right; }
    .split-pct  { font-size: .78rem; color: var(--gray-600); }
    .split-amt  { font-size: .85rem; font-weight: 500; display: block; }
    .split-total-cell { font-weight: 600; text-align: right; }
    .coverage-note {
      font-size: .75rem; color: var(--gray-400);
      margin-top: 8px; text-align: right;
    }

    /* ── Auth page ──────────────────────────── */
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .auth-card { background:var(--white); border-radius:var(--r-lg); padding:32px 28px; width:100%; max-width:380px; box-shadow:0 4px 24px rgba(0,0,0,.12); }
    .auth-logo { text-align:center; margin-bottom:22px; }
    .auth-logo .logo-icon { font-size:2.5rem; line-height:1; }
    .auth-logo h1 { font-size:1.2rem; font-weight:700; color:var(--green); margin-top:6px; }
    .auth-tabs { display:flex; border-bottom:2px solid var(--gray-200); margin-bottom:20px; }
    .auth-tab { flex:1; padding:8px; text-align:center; font-size:.9rem; font-weight:500; color:var(--gray-600); cursor:pointer; border:none; background:none; font-family:inherit; border-bottom:2px solid transparent; margin-bottom:-2px; transition:color .15s; }
    .auth-tab.active { color:var(--green); border-bottom-color:var(--green); }
    .auth-error { background:#fee2e2; color:#dc2626; border-radius:var(--r); padding:10px 12px; font-size:.85rem; margin-bottom:14px; display:none; }
    .auth-error.show { display:block; }
    /* ── Chat page ──────────────────────────── */
    .chat-wrap { display:flex; flex-direction:column; height:calc(100dvh - 54px); max-width:680px; margin:0 auto; }
    .chat-messages { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:1px; -webkit-overflow-scrolling:touch; }
    .msg-group { display:flex; gap:10px; margin-top:14px; }
    .msg-group:first-child { margin-top:4px; }
    .msg-avatar { width:34px; height:34px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; color:white; flex-shrink:0; }
    .msg-group-body { flex:1; min-width:0; }
    .msg-meta { display:flex; align-items:baseline; gap:8px; margin-bottom:3px; }
    .msg-author { font-size:.88rem; font-weight:700; color:var(--gray-900); }
    .msg-ts { font-size:.75rem; color:var(--gray-400); }
    .msg-bubble { background:var(--white); border-radius:4px; padding:7px 11px; font-size:.88rem; line-height:1.45; color:var(--gray-900); box-shadow:var(--shadow); word-break:break-word; margin-bottom:2px; max-width:100%; display:inline-block; }
    .msg-bubble.own { background:var(--green-light); }
    .msg-continue { margin-left:44px; margin-bottom:2px; }
    .chat-date-sep { text-align:center; font-size:.73rem; color:var(--gray-400); font-weight:600; letter-spacing:.04em; text-transform:uppercase; margin:12px 0; display:flex; align-items:center; gap:8px; }
    .chat-date-sep::before, .chat-date-sep::after { content:''; flex:1; height:1px; background:var(--gray-200); }
    .chat-input-wrap { padding:8px 10px; border-top:1px solid var(--gray-200); background:var(--white); display:flex; gap:6px; align-items:flex-end; padding-bottom:max(8px, env(safe-area-inset-bottom)); }
    /* font-size 16px prevents iOS auto-zoom on focus */
    .chat-input { flex:1; padding:9px 12px; border:1.5px solid var(--gray-200); border-radius:var(--r); font-size:16px; font-family:inherit; resize:none; max-height:120px; line-height:1.4; transition:border-color .15s; }
    .chat-input:focus { outline:none; border-color:var(--green); }
    .chat-attach-btn { background:var(--gray-100); color:var(--gray-600); border:none; border-radius:var(--r); width:38px; height:38px; font-size:1.1rem; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:background .15s; }
    .chat-attach-btn:hover { background:var(--gray-200); }
    .chat-send-btn { background:var(--green); color:white; border:none; border-radius:var(--r); width:38px; height:38px; font-size:1rem; cursor:pointer; transition:background .15s; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .chat-send-btn:hover { background:var(--green-hover); }
    .chat-send-btn:disabled { opacity:.45; cursor:default; }
    .chat-empty { text-align:center; color:var(--gray-400); font-size:.88rem; padding:40px 20px; }
    .unread-dot { display:inline-block; width:8px; height:8px; background:var(--green); border-radius:50%; margin-left:6px; vertical-align:middle; }
    /* Image attachments */
    .msg-img { max-width:260px; max-height:320px; border-radius:8px; display:block; cursor:pointer; margin-top:4px; }
    .msg-img-loading { width:200px; height:120px; background:var(--gray-100); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.8rem; color:var(--gray-400); }
    .msg-file { display:inline-flex; align-items:center; gap:8px; background:var(--gray-100); border-radius:8px; padding:8px 12px; font-size:.85rem; color:var(--gray-900); text-decoration:none; margin-top:4px; }
    .msg-file:hover { background:var(--gray-200); }
    .upload-progress { height:3px; background:var(--green); border-radius:2px; transition:width .2s; margin-top:4px; }
    /* Image lightbox */
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:999; display:none; align-items:center; justify-content:center; padding:20px; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:100%; max-height:100%; border-radius:8px; object-fit:contain; }
    .lightbox-close { position:absolute; top:16px; right:16px; background:none; border:none; color:white; font-size:1.8rem; cursor:pointer; line-height:1; }
    /* ── Profile modal ──────────────────────── */
    .profile-section { margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid var(--gray-100); }
    .profile-section:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
    .profile-label { font-size:.78rem; font-weight:600; color:var(--gray-600); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
    .notif-status { font-size:.85rem; color:var(--gray-600); margin-bottom:10px; }
    .notif-status strong { color:var(--gray-900); }
    /* ── Add meal button ────────────────────── */
    .add-meal-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; width: 100%;
      padding: 10px; margin-top: 4px;
      background: var(--gray-50); border: 1.5px dashed var(--gray-200);
      border-radius: var(--r-lg); cursor: pointer;
      font-size: .85rem; color: var(--gray-600);
      font-family: inherit; transition: all .15s;
    }
    .add-meal-btn:hover { background: var(--green-light); border-color: var(--green); color: var(--green); }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────── -->
<header class="header">
  <button id="back-btn" class="header-btn" style="display:none" onclick="navigateBack()">← Back</button>
  <h1 id="header-title">Trip Meal Planner</h1>
  <button id="chat-btn" class="header-btn" style="display:none" onclick="navigate('/trip/'+currentTripId+'/chat')">💬 Chat</button>
  <button id="share-btn" class="header-btn" style="display:none" onclick="shareTrip()">🔗 Share</button>
  <button id="profile-btn" class="header-btn" style="display:none" onclick="openProfileModal()">👤</button>
</header>

<!-- ── Page: Auth ───────────────────────────────────────── -->
<div id="page-auth" class="page">
  <div class="auth-page">
    <div class="auth-card">

<script>
// ── Firebase init ──────────────────────────────────────────
let db, auth, messaging, functions, storage;
try {
  if (window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.apiKey !== 'REPLACE_ME') {
    firebase.initializeApp(window.FIREBASE_CONFIG);
    db        = firebase.firestore();
    auth      = firebase.auth();
    functions = firebase.functions();
    storage   = firebase.storage();
    try { messaging = firebase.messaging(); } catch(e) { /* unsupported browser */ }
  }
} catch(e) { console.error('Firebase init error:', e); }

function isReady() {
  if (!db) {
    const el = document.getElementById('setup-banner');
    if (el) el.innerHTML = `<div class="setup-banner"><strong>⚙️ Firebase not configured yet</strong> Edit <code>firebase-config.js</code> with your Firebase project credentials.</div>`;
    return false;
  }
  return true;
}

// ── Auth state ─────────────────────────────────────────────
let currentUser = null;

// ── Chat state ─────────────────────────────────────────────
let chatUnsub      = null;
let currentChatId  = null;

// ── Helpers ────────────────────────────────────────────────
const h = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

function combineQuantity(quantities) {
  const q = quantities.map(s => String(s).trim()).filter(Boolean);
  if (!q.length) return '';
  // Pure numbers
  if (q.every(s => /^[\d.]+$/.test(s))) {
    const sum = q.reduce((a, s) => a + parseFloat(s), 0);
    return String(Math.round(sum * 1000) / 1000);
  }
  // "number unit" pattern (e.g. "2 kg", "500g", "1.5 L")
  const parsed = q.map(s => { const m = s.match(/^([\d.,]+)\s*(.*)$/); return m ? { n: parseFloat(m[1].replace(',','.')), unit: m[2].trim().toLowerCase() } : null; });
  if (parsed.every(Boolean)) {
    const units = new Set(parsed.map(p => p.unit));
    if (units.size === 1) {
      const unit  = [...units][0];
      const sum   = Math.round(parsed.reduce((a, p) => a + p.n, 0) * 1000) / 1000;
      return unit ? `${sum} ${unit}` : String(sum);
    }
  }
  return q.join(' + ');
}

function fmtAmt(n) {
  return n % 1 === 0 ? String(n) : n.toFixed(2);
}

const localDateStr = d => {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dy = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dy}`;
};

// ── Local trip ID tracking ─────────────────────────────────
function getLocalIds() {
  try { return JSON.parse(localStorage.getItem('trip_planner_ids') || '[]'); }
  catch { return []; }
}
function addLocalId(id) {
  const ids = getLocalIds();
  if (!ids.includes(id)) { ids.unshift(id); localStorage.setItem('trip_planner_ids', JSON.stringify(ids)); }
}
function removeLocalId(id) {
  localStorage.setItem('trip_planner_ids', JSON.stringify(getLocalIds().filter(i => i !== id)));
}

// ── Auth ───────────────────────────────────────────────────
function showAuthTab(tab) {
  document.getElementById('auth-form-signin').style.display   = tab === 'signin'   ? '' : 'none';
  document.getElementById('auth-form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-signin').classList.toggle('active',   tab === 'signin');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('auth-error').classList.remove('show');
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.classList.add('show');
}

async function signIn() {
  const email = document.getElementById('signin-email').value.trim();
  const pass  = document.getElementById('signin-password').value;
  if (!email || !pass) { showAuthError('Enter your email and password.'); return; }
  const btn = document.getElementById('signin-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    showAuthError(friendlyAuthError(e));
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

async function register() {
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-password').value;
  if (!name)  { showAuthError('Enter your display name.'); return; }
  if (!email) { showAuthError('Enter your email.'); return; }
  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: name });
    await db.collection('users').doc(cred.user.uid).set({ displayName: name, email, fcmTokens: [] }, { merge: true });
  } catch(e) {
    showAuthError(friendlyAuthError(e));
    btn.disabled = false; btn.textContent = 'Create account';
  }
}

async function signOutUser() {
  closeProfileModal();
  if (chatUnsub) { chatUnsub(); chatUnsub = null; }
  if (firestoreUnsub) { firestoreUnsub(); firestoreUnsub = null; }
  await auth.signOut();
}

function friendlyAuthError(e) {
  const map = {
    'auth/invalid-email':          'Invalid email address.',
    'auth/user-not-found':         'No account with that email.',
    'auth/wrong-password':         'Incorrect password.',
    'auth/email-already-in-use':   'That email is already registered.',
    'auth/weak-password':          'Password must be at least 6 characters.',
    'auth/too-many-requests':      'Too many attempts. Try again later.',
    'auth/invalid-credential':     'Email or password is incorrect.',
  };
  return map[e.code] || e.message;
}

async function saveDisplayName() {
  const name = document.getElementById('profile-name-input').value.trim();
  if (!name) return;
  try {
    await currentUser.updateProfile({ displayName: name });
    await db.collection('users').doc(currentUser.uid).set({ displayName: name }, { merge: true });
    document.getElementById('profile-btn').textContent = '👤 ' + name.split(' ')[0];
  } catch(e) { alert(e.message); }
}

function openProfileModal() {
  document.getElementById('profile-name-input').value = currentUser?.displayName || '';
  updateNotifStatus();
  document.getElementById('modal-profile').classList.add('open');
}
function closeProfileModal() {
  document.getElementById('modal-profile').classList.remove('open');
}

// ── Notifications (FCM) ────────────────────────────────────
async function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
    // Pass Firebase config to service worker so it can init Firebase
    const postConfig = () => {
      const target = reg.active || reg.waiting || reg.installing;
      if (target) target.postMessage({ type: 'FIREBASE_CONFIG', config: window.FIREBASE_CONFIG });
    };
    if (reg.active) postConfig();
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => { if (sw.state === 'activated') postConfig(); });
    });
    return reg;
  } catch(e) { console.warn('SW registration failed:', e); }
}

async function enableNotifications() {
  if (!messaging) { alert('Push notifications are not supported in this browser.'); return; }
  try {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') { updateNotifStatus(); return; }
    const token = await messaging.getToken({ vapidKey: window.FIREBASE_CONFIG?.vapidKey, serviceWorkerRegistration: await navigator.serviceWorker.ready });
    if (token && currentUser) {
      await db.collection('users').doc(currentUser.uid).set({ fcmTokens: firebase.firestore.FieldValue.arrayUnion(token) }, { merge: true });
    }
    updateNotifStatus();
  } catch(e) { console.error('FCM token error:', e); updateNotifStatus(); }
}

function updateNotifStatus() {
  const statusEl = document.getElementById('notif-status');
  const enableBtn = document.getElementById('notif-enable-btn');
  if (!statusEl) return;
  if (!('Notification' in window)) {
    statusEl.innerHTML = '<strong>Not supported</strong> in this browser.'; return;
  }
  if (Notification.permission === 'granted') {
    statusEl.innerHTML = '<strong>✓ Enabled</strong> — you will receive message notifications.';
    if (enableBtn) enableBtn.style.display = 'none';
  } else if (Notification.permission === 'denied') {
    statusEl.innerHTML = '<strong>Blocked</strong> — enable notifications in your browser/OS settings.';
    if (enableBtn) enableBtn.style.display = 'none';
  } else {
    statusEl.innerHTML = 'Notifications are <strong>not yet enabled</strong>.';
    if (enableBtn) enableBtn.style.display = '';
  }
}

async function testNotification() {
  if (!functions) { alert('Firebase not configured.'); return; }
  try {
    const fn = functions.httpsCallable('sendTestNotification');
    const result = await fn();
    alert(`Test sent! Delivered to ${result.data.sent} device(s). Check your notification tray.`);
  } catch(e) {
    alert('Error: ' + (e.message || e));
  }
}

// Handle foreground FCM messages (app is open)
function initForegroundMessaging() {
  if (!messaging) return;
  messaging.onMessage(payload => {
    const { title, body } = payload.notification || {};
    if (!title) return;
    // Show an in-app toast instead of native notification when app is focused
    showToast(`${title}: ${body}`);
  });
}

let toastTimer;
function showToast(msg) {
  let el = document.getElementById('app-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'app-toast';
    Object.assign(el.style, { position:'fixed', bottom:'80px', left:'50%', transform:'translateX(-50%)', background:'#1a1a1a', color:'#fff', padding:'10px 18px', borderRadius:'20px', fontSize:'.85rem', zIndex:'9999', maxWidth:'320px', textAlign:'center', boxShadow:'0 4px 16px rgba(0,0,0,.3)', transition:'opacity .3s' });
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 3500);
}

// ── Chat ───────────────────────────────────────────────────
const AVATAR_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e'];
function avatarColor(name) {
  let n = 0; for (const c of (name||'?')) n = (n * 31 + c.charCodeAt(0)) >>> 0;
  return AVATAR_COLORS[n % AVATAR_COLORS.length];
}
function initials(name) {
  return (name||'?').split(/\s+/).map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function subscribeToChat(tripId) {
  if (chatUnsub) { chatUnsub(); chatUnsub = null; }
  currentChatId = tripId;
  const container = document.getElementById('chat-messages');
  chatUnsub = db.collection('trips').doc(tripId).collection('messages')
    .orderBy('timestamp', 'asc')
    .onSnapshot(snap => {
      const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderMessages(msgs);
    }, err => {
      console.error('Chat error:', err);
      if (container) container.innerHTML = `
        <div class="chat-empty">
          <div style="font-size:1.5rem;margin-bottom:8px">⚠️</div>
          <div style="color:var(--gray-900);font-weight:600;margin-bottom:6px">Could not load messages</div>
          <div style="font-size:.8rem;color:var(--gray-400);margin-bottom:16px">${h(err.message)}</div>
          <button class="btn btn-secondary btn-sm" onclick="subscribeToChat('${tripId}')">Retry</button>
        </div>`;
    });
}

async function handleFileSelect(input) {
  const file = input.files[0];
  if (!file || !currentUser || !storage) return;
  input.value = '';

  const MAX_MB = 10;
  if (file.size > MAX_MB * 1024 * 1024) { alert(`File is too large. Max ${MAX_MB} MB.`); return; }

  const isImage = file.type.startsWith('image/');
  const ext     = file.name.split('.').pop();
  const path    = `trips/${currentChatId}/${Date.now()}_${uid()}.${ext}`;
  const ref     = storage.ref(path);

  const bar      = document.getElementById('upload-bar');
  const prog     = document.getElementById('upload-progress');
  const label    = document.getElementById('upload-label');
  bar.style.display = '';
  label.textContent = `Uploading ${file.name}…`;
  prog.style.width  = '0%';

  const uploadTask = ref.put(file);
  uploadTask.on('state_changed',
    snap => { prog.style.width = Math.round(snap.bytesTransferred / snap.totalBytes * 100) + '%'; },
    err  => { bar.style.display = 'none'; alert('Upload failed: ' + err.message); },
    async () => {
      bar.style.display = 'none';
      const url = await uploadTask.snapshot.ref.getDownloadURL();
      await db.collection('trips').doc(currentChatId).collection('messages').add({
        text:       '',
        fileUrl:    url,
        fileName:   file.name,
        fileType:   file.type,
        isImage,
        authorUid:  currentUser.uid,
        authorName: currentUser.displayName || currentUser.email.split('@')[0],
        timestamp:  firebase.firestore.FieldValue.serverTimestamp(),
        tripId:     currentChatId,
      });
    }
  );
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

async function sendChatMessage() {
  if (!currentUser) return;
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;
  const btn = document.getElementById('chat-send-btn');
  btn.disabled = true;
  input.value = ''; input.style.height = 'auto';
  try {
    await db.collection('trips').doc(currentChatId).collection('messages').add({
      text,
      authorUid:  currentUser.uid,
      authorName: currentUser.displayName || currentUser.email.split('@')[0],
      timestamp:  firebase.firestore.FieldValue.serverTimestamp(),
      tripId:     currentChatId,
    });
  } catch(e) { alert(e.message); input.value = text; }
  btn.disabled = false;
  document.getElementById('chat-input')?.focus();
}

function msgContent(msg, isOwn) {
  if (msg.isImage && msg.fileUrl) {
    return `<img class="msg-img" src="${h(msg.fileUrl)}" alt="${h(msg.fileName||'image')}" onclick="openLightbox('${h(msg.fileUrl)}')">`;
  }
  if (msg.fileUrl) {
    const icon = '📄';
    return `<a class="msg-file" href="${h(msg.fileUrl)}" target="_blank" rel="noopener">${icon} ${h(msg.fileName||'File')}</a>`;
  }
  const escaped = h(msg.text||'').replace(/\n/g,'<br>');
  return `<div class="msg-bubble${isOwn?' own':''}">${escaped}</div>`;
}

function renderMessages(msgs) {
  const container = document.getElementById('chat-messages');
  if (!container) return;
  const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
  if (!msgs.length) {
    container.innerHTML = `<div class="chat-empty">No messages yet — say hello! 👋</div>`;
    return;
  }
  let html = '', lastUid = null, lastDate = null, lastTs = null;
  for (const msg of msgs) {
    const ts   = msg.timestamp?.toDate?.() || new Date();
    const date = localDateStr(ts);
    if (date !== lastDate) {
      lastDate = date; lastUid = null;
      html += `<div class="chat-date-sep">${ts.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>`;
    }
    const gap      = lastTs ? (ts - lastTs) / 60000 : 999;
    const newGroup = msg.authorUid !== lastUid || gap > 5;
    const isOwn    = msg.authorUid === currentUser?.uid;
    const timeStr  = ts.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
    const content  = msgContent(msg, isOwn);
    if (newGroup) {
      const color = avatarColor(msg.authorName);
      html += `<div class="msg-group">
        <div class="msg-avatar" style="background:${color}">${initials(msg.authorName)}</div>
        <div class="msg-group-body">
          <div class="msg-meta"><span class="msg-author">${h(msg.authorName)}</span><span class="msg-ts">${timeStr}</span></div>
          ${content}
        </div></div>`;
    } else {
      html += `<div class="msg-continue">${content}</div>`;
    }
    lastUid = msg.authorUid; lastTs = ts;
  }
  container.innerHTML = html;
  if (atBottom || lastTs === null) container.scrollTop = container.scrollHeight;
}

// ── Meal computation ───────────────────────────────────────
const MEAL_DEFS = [
  { type: 'Breakfast', hour: 8 },
  { type: 'Lunch',     hour: 12 },
  { type: 'Dinner',    hour: 18 },
];

function computeMeals(startIso, endIso, removedMeals = [], customMeals = []) {
  const start = new Date(startIso);
  const end   = new Date(endIso);
  const meals = [];
  const day   = new Date(start); day.setHours(0,0,0,0);
  const endDay = new Date(end);  endDay.setHours(0,0,0,0);
  while (day <= endDay) {
    for (const def of MEAL_DEFS) {
      const mt = new Date(day); mt.setHours(def.hour, 0, 0, 0);
      if (mt >= start && mt <= end) {
        const date = localDateStr(day);
        const key  = `${date}_${def.type}`;
        if (!removedMeals.includes(key)) {
          meals.push({ date, type: def.type, hour: def.hour, timeStr: `${String(def.hour).padStart(2,'0')}:00`, key });
        }
      }
    }
    day.setDate(day.getDate() + 1);
  }
  for (const cm of customMeals) {
    if (!removedMeals.includes(cm.key)) meals.push(cm);
  }
  meals.sort((a, b) => a.date !== b.date ? a.date.localeCompare(b.date) : a.hour - b.hour);
  return meals;
}

// ── Navigation ─────────────────────────────────────────────
let currentTripId  = null;
let firestoreUnsub = null;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

function setHeaderBtns({ back=false, chat=false, share=false, profile=false }) {
  const s = v => v ? 'flex' : 'none';
  document.getElementById('back-btn').style.display    = s(back);
  document.getElementById('chat-btn').style.display    = s(chat);
  document.getElementById('share-btn').style.display   = s(share);
  document.getElementById('profile-btn').style.display = s(profile);
}

function navigateBack() {
  if (currentTripId && location.hash.includes('/chat')) navigate(`/trip/${currentTripId}`);
  else navigate('/');
}

function navigate(route) {
  if (!currentUser) { showPage('page-auth'); return; }
  if (firestoreUnsub && !route.startsWith('/trip/')) { firestoreUnsub(); firestoreUnsub = null; }
  if (chatUnsub && !route.includes('/chat')) { chatUnsub(); chatUnsub = null; }

  if (route === '/') {
    showPage('page-trips');
    setHeaderBtns({ profile: true });
    document.getElementById('header-title').textContent = 'Trip Meal Planner';
    history.replaceState(null, '', location.pathname + '#/');
    loadTripsList();

  } else if (/^\/trip\/([^/]+)$/.test(route)) {
    const id = route.slice(6);
    currentTripId = id;
    addLocalId(id);
    if (currentUser) joinTripAsMember(id);
    showPage('page-trip');
    setHeaderBtns({ back: true, chat: true, share: true, profile: true });
    history.replaceState(null, '', location.pathname + `#/trip/${id}`);
    subscribeToTrip(id);

  } else if (/^\/trip\/([^/]+)\/chat$/.test(route)) {
    const id = route.split('/')[2];
    currentTripId = id;
    showPage('page-chat');
    setHeaderBtns({ back: true, profile: true });
    document.getElementById('header-title').textContent = '💬 Chat';
    history.replaceState(null, '', location.pathname + `#/trip/${id}/chat`);
    subscribeToChat(id);
    setTimeout(() => document.getElementById('chat-input')?.focus(), 100);
  }
}

async function joinTripAsMember(tripId) {
  if (!currentUser || !db) return;
  try {
    await db.collection('trips').doc(tripId).update({
      memberUids: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
    });
    // Mirror trip in user's profile for future use
    await db.collection('users').doc(currentUser.uid).set({
      tripIds: firebase.firestore.FieldValue.arrayUnion(tripId)
    }, { merge: true });
  } catch(e) { /* trip may not exist yet */ }
}

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1) || '/';
  navigate(hash);
});

// ── Firestore: trips list ──────────────────────────────────
async function loadTripsList() {
  if (!isReady()) return;
  const ids = getLocalIds();
  const container = document.getElementById('trips-list');
  if (ids.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🏕️</div><p>No trips yet.<br>Create your first one!</p></div>`;
    return;
  }
  container.innerHTML = `<div class="loading">Loading…</div>`;
  try {
    const docs = await Promise.all(ids.map(id => db.collection('trips').doc(id).get()));
    const trips = docs
      .map(d => d.exists ? { id: d.id, ...d.data() } : null)
      .filter(Boolean);
    // Prune IDs for deleted trips
    localStorage.setItem('trip_planner_ids', JSON.stringify(trips.map(t => t.id)));
    renderTripsList(trips);
  } catch(e) {
    container.innerHTML = `<div class="empty-state"><p>Error loading trips: ${h(e.message)}</p></div>`;
  }
}

// ── Firestore: trip detail (real-time) ─────────────────────
function subscribeToTrip(id) {
  if (!isReady()) return;
  document.getElementById('trip-info-card').innerHTML   = '<div class="loading">Loading…</div>';
  document.getElementById('participants-card').innerHTML = '';
  document.getElementById('meals-section').innerHTML    = '';

  firestoreUnsub = db.collection('trips').doc(id).onSnapshot(doc => {
    if (!doc.exists) { alert('Trip not found.'); navigate('/'); return; }
    const trip = { id: doc.id, ...doc.data() };
    lastTripData = trip;
    document.getElementById('header-title').textContent = trip.name;
    renderTripDetail(trip);
  }, err => {
    alert('Error: ' + err.message);
  });
}

// ── Trip CRUD ──────────────────────────────────────────────
function openModal() {
  const today    = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const fmt = d => localDateStr(d);
  document.getElementById('new-trip-start-date').value = fmt(today);
  document.getElementById('new-trip-end-date').value   = fmt(tomorrow);
  document.getElementById('new-trip-name').value       = '';
  document.getElementById('modal-new-trip').classList.add('open');
  setTimeout(() => document.getElementById('new-trip-name').focus(), 50);
}
function closeModal() {
  document.getElementById('modal-new-trip').classList.remove('open');
}

async function createTrip() {
  if (!isReady()) return;
  const name  = document.getElementById('new-trip-name').value.trim();
  const sd    = document.getElementById('new-trip-start-date').value;
  const st    = document.getElementById('new-trip-start-time').value;
  const ed    = document.getElementById('new-trip-end-date').value;
  const et    = document.getElementById('new-trip-end-time').value;
  if (!name)       { alert('Enter a trip name.'); return; }
  if (!sd || !ed)  { alert('Enter start and end dates.'); return; }
  const start = `${sd}T${st}`;
  const end   = `${ed}T${et}`;
  if (new Date(end) <= new Date(start)) { alert('End must be after start.'); return; }

  const btn = document.querySelector('#modal-new-trip .btn-primary');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const ref = await db.collection('trips').add({
      name, startDatetime: start, endDatetime: end,
      participants: [], mealData: {},
      removedMeals: [], customMeals: [], paidAmounts: {},
      memberUids: currentUser ? [currentUser.uid] : [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeModal();
    navigate(`/trip/${ref.id}`);
  } catch(e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Create Trip';
  }
}

async function deleteTrip(id) {
  if (!confirm('Delete this trip? All data will be lost for everyone.')) return;
  try {
    await db.collection('trips').doc(id).delete();
    removeLocalId(id);
    navigate('/');
  } catch(e) { alert(e.message); }
}

async function addCustomMeal() {

// ── Participants ───────────────────────────────────────────
async function addParticipant() {
  const input = document.getElementById('new-participant-input');
  const name  = input.value.trim();
  if (!name) return;
  input.value = '';
  try {
    await db.collection('trips').doc(currentTripId).update({
      participants: firebase.firestore.FieldValue.arrayUnion(name)
    });
  } catch(e) { alert(e.message); input.value = name; }
}

async function removeParticipant(name) {
  if (!confirm(`Remove ${name} from this trip?`)) return;
  try {
    const snap    = await db.collection('trips').doc(currentTripId).get();
    const mealData = snap.data()?.mealData || {};
    const updates  = { participants: firebase.firestore.FieldValue.arrayRemove(name) };
    for (const [key, md] of Object.entries(mealData)) {
      if (md.cook === name) updates[`mealData.${key}.cook`] = null;
      if (md.cooks?.includes(name)) {
        updates[`mealData.${key}.cooks`] = md.cooks.filter(c => c !== name);
      }
      if (md.joiners?.includes(name)) {
        updates[`mealData.${key}.joiners`] = md.joiners.filter(j => j !== name);
      }
    }
    await db.collection('trips').doc(currentTripId).update(updates);
  } catch(e) { alert(e.message); }
}

// ── Meal assignments ───────────────────────────────────────
async function toggleCook(mealKey, name) {
  try {
    const snap    = await db.collection('trips').doc(currentTripId).get();
    const md      = snap.data()?.mealData?.[mealKey] || {};
    const cooks   = md.cooks ?? (md.cook ? [md.cook] : []);
    const next    = cooks.includes(name) ? cooks.filter(c => c !== name) : [...cooks, name];
    const updates = {
      [`mealData.${mealKey}.cooks`]: next,
      [`mealData.${mealKey}.cook`]: next[0] ?? null,
    };
    const joiners = md.joiners || [];
    if (!cooks.includes(name) && !joiners.includes(name)) {
      updates[`mealData.${mealKey}.joiners`] = [...joiners, name];
    }
    await db.collection('trips').doc(currentTripId).update(updates);
  } catch(e) { alert(e.message); }
}

async function toggleJoiner(mealKey, name) {
  const snap    = await db.collection('trips').doc(currentTripId).get();
  const joiners = snap.data()?.mealData?.[mealKey]?.joiners || [];
  const next    = joiners.includes(name) ? joiners.filter(j => j !== name) : [...joiners, name];
  await db.collection('trips').doc(currentTripId).update({
    [`mealData.${mealKey}.joiners`]: next
  }).catch(e => alert(e.message));
}

let editingGrocery = null; // { mealKey, id }
let lastTripData   = null;

function editGrocery(mealKey, id) {
  editingGrocery = { mealKey, id };
  if (lastTripData) renderTripDetail(lastTripData);
}

function cancelEditGrocery() {
  editingGrocery = null;
  if (lastTripData) renderTripDetail(lastTripData);
}

async function saveGrocery(mealKey, id) {
  const nameEl = document.getElementById(`ge-name-${id}`);
  const qtyEl  = document.getElementById(`ge-qty-${id}`);
  const item   = nameEl?.value.trim();
  if (!item) { alert('Item name cannot be empty.'); return; }
  try {
    const snap      = await db.collection('trips').doc(currentTripId).get();
    const groceries = (snap.data()?.mealData?.[mealKey]?.groceries || []).map(g =>
      g.id === id ? { ...g, item, quantity: qtyEl?.value.trim() || '' } : g
    );
    await db.collection('trips').doc(currentTripId).update({
      [`mealData.${mealKey}.groceries`]: groceries
    });
    editingGrocery = null;
  } catch(e) { alert(e.message); }
}

async function addGrocery(mealKey) {
  const nameEl = document.getElementById(`g-name-${mealKey}`);
  const qtyEl  = document.getElementById(`g-qty-${mealKey}`);
  const item   = nameEl.value.trim();
  if (!item) return;
  const entry = { id: uid(), item, quantity: qtyEl.value.trim() };
  nameEl.value = ''; qtyEl.value = '';
  try {
    const snap      = await db.collection('trips').doc(currentTripId).get();
    const groceries = snap.data()?.mealData?.[mealKey]?.groceries || [];
    await db.collection('trips').doc(currentTripId).update({
      [`mealData.${mealKey}.groceries`]: [...groceries, entry]
    });
    nameEl.focus();
  } catch(e) { alert(e.message); nameEl.value = item; }
}

async function removeGrocery(mealKey, groceryId) {
  try {
    const snap      = await db.collection('trips').doc(currentTripId).get();
    const groceries = (snap.data()?.mealData?.[mealKey]?.groceries || []).filter(g => g.id !== groceryId);
    await db.collection('trips').doc(currentTripId).update({
      [`mealData.${mealKey}.groceries`]: groceries
    });
  } catch(e) { alert(e.message); }
}

// ── Render: Trips list ─────────────────────────────────────
function renderTripsList(trips) {
  const container = document.getElementById('trips-list');
  if (trips.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🏕️</div><p>No trips yet.<br>Create your first one!</p></div>`;
    return;
  }
  const fmtD = d => new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric' });
  container.innerHTML = trips.map(trip => {
    const meals    = computeMeals(trip.startDatetime, trip.endDatetime, trip.removedMeals || [], trip.customMeals || []);
    const assigned = Object.values(trip.mealData || {}).filter(m => (m.cooks?.length || m.cook)).length;
    return `
      <div class="trip-card" onclick="navigate('/trip/${trip.id}')">
        <div>
          <h3>${h(trip.name)}</h3>
          <div class="trip-meta">
            <span>📅 ${fmtD(trip.startDatetime)} – ${fmtD(trip.endDatetime)}</span>
            <span>🍽️ ${assigned}/${meals.length} meals assigned</span>
            <span>👥 ${(trip.participants||[]).length} people</span>
          </div>
        </div>
        <span class="trip-arrow">›</span>
      </div>`;
  }).join('');
}

// ── Render: Trip detail ────────────────────────────────────
function renderTripDetail(trip) {
  // Remember which meals were open and what the user was typing
  const openMeals = new Set([...document.querySelectorAll('.meal-body.open')].map(el => el.dataset.key));
  const focusId   = document.activeElement?.id;
  const focusVal  = document.activeElement?.value;

  lastTripData  = trip;
  const meals   = computeMeals(trip.startDatetime, trip.endDatetime, trip.removedMeals || [], trip.customMeals || []);
  const fmtDT   = iso => {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' })
      + ' ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12: false });
  };

  // ── Info card ──
  document.getElementById('trip-info-card').innerHTML = `
    <div class="card-row">
      <div>
        <h2>${h(trip.name)}</h2>
        <div class="trip-detail-meta">
          <span>📅 ${fmtDT(trip.startDatetime)}</span>
          <span>→ ${fmtDT(trip.endDatetime)}</span>
          <span>🍽️ ${meals.length} meals total</span>
        </div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteTrip('${trip.id}')">Delete</button>
    </div>`;

  // ── Participants card ──
  document.getElementById('participants-card').innerHTML = `
    <div class="section-header"><span class="section-title">👥 Participants</span></div>
    <div class="chips">
      ${(trip.participants || []).length === 0
        ? '<span class="muted">No participants yet</span>'
        : (trip.participants || []).map(p => `
            <span class="chip">
              ${h(p)}
              <button class="chip-remove" data-name="${h(p)}">✕</button>
            </span>`).join('')
      }
    </div>
    <div class="add-row">
      <input id="new-participant-input" type="text" placeholder="Add name…"
        onkeydown="if(event.key==='Enter')addParticipant()">
      <button class="btn btn-primary btn-sm" onclick="addParticipant()">Add</button>
    </div>`;

  // ── Meals ──
  if (meals.length === 0) {
    document.getElementById('meals-section').innerHTML =
      `<div class="card"><p class="muted" style="text-align:center;padding:16px">No meals fall within this trip's time range.</p></div>`;
    restoreFocus(focusId, focusVal);
    return;
  }

  // Group by date
  const byDate = {};
  for (const m of meals) {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  }

  const noParticipants = (trip.participants || []).length === 0;

  let html = `<div class="section-header" style="padding:0 4px"><span class="section-title">🍽️ Meals</span></div>`;

  for (const [date, dateMeals] of Object.entries(byDate)) {
    const dayLabel = new Date(date + 'T12:00:00').toLocaleDateString('en-US', {
      weekday: 'long', month: 'short', day: 'numeric'
    });
    html += `<div class="day-group"><div class="day-label">${dayLabel}</div>`;

    for (const meal of dateMeals) {
      const md     = trip.mealData?.[meal.key] || { cook: null, joiners: [], groceries: [] };
      const isOpen = openMeals.has(meal.key);
      const icon   = meal.type === 'Breakfast' ? '🌅' : meal.type === 'Lunch' ? '☀️' : '🌙';

      const mealCooks = md.cooks ?? (md.cook ? [md.cook] : []);
      const summaryParts = [];
      if (mealCooks.length)               summaryParts.push(`👨‍🍳 ${mealCooks.length}`);
      if ((md.joiners||[]).length)        summaryParts.push(`${md.joiners.length} joining`);
      if ((md.groceries||[]).length)      summaryParts.push(`${md.groceries.length} item${md.groceries.length !== 1 ? 's' : ''}`);
      const summary = summaryParts.join(' · ');

      const timeDisplay = meal.timeStr || `${String(meal.hour).padStart(2,'0')}:00`;
      html += `
        <div class="meal-card">
          <div class="meal-header" onclick="toggleMeal('${meal.key}')">
            <span>${icon}</span>
            <span class="badge badge-${meal.type.toLowerCase()}">${meal.type}</span>
            <span class="meal-time">${timeDisplay}</span>
            <span class="meal-summary">${summary}</span>
            <span class="chevron ${isOpen ? 'open' : ''}" id="chev-${meal.key}">›</span>
          </div>
          <div class="meal-body ${isOpen ? 'open' : ''}" data-key="${meal.key}" id="body-${meal.key}">
            ${noParticipants
              ? `<p class="muted" style="margin-top:13px">Add participants above to assign this meal.</p>`
              : `
              <div class="meal-section">
                <div class="section-label">Cook (${mealCooks.length})</div>
                <div class="pills">
                  ${(trip.participants||[]).map(p => `
                    <button class="pill ${mealCooks.includes(p) ? 'active' : ''}"
                      data-meal-key="${meal.key}" data-name="${h(p)}" data-role="cook">
                      ${h(p)}
                    </button>`).join('')}
                </div>
              </div>
              <div class="meal-section">
                <div class="section-label">Who's joining (${(md.joiners||[]).length})</div>
                <div class="pills">
                  ${(trip.participants||[]).map(p => `
                    <button class="pill ${(md.joiners||[]).includes(p) ? 'active' : ''}"
                      data-meal-key="${meal.key}" data-name="${h(p)}" data-role="joiner">
                      ${h(p)}
                    </button>`).join('')}
                </div>
              </div>`
            }
            <div class="meal-section">
              <div class="section-label">Groceries</div>
              ${(md.groceries||[]).length > 0 ? `
                <ul class="grocery-list">
                  ${(md.groceries||[]).map(g => {
                    const isEditing = editingGrocery && editingGrocery.mealKey === meal.key && editingGrocery.id === g.id;
                    if (isEditing) {
                      return `
                        <li class="grocery-edit-row">
                          <input id="ge-name-${g.id}" type="text" value="${h(g.item)}"
                            class="input-sm input-flex"
                            onkeydown="if(event.key==='Enter')saveGrocery('${meal.key}','${g.id}');if(event.key==='Escape')cancelEditGrocery()">
                          <input id="ge-qty-${g.id}" type="text" value="${h(g.quantity||'')}"
                            placeholder="Qty" class="input-sm input-qty"
                            onkeydown="if(event.key==='Enter')saveGrocery('${meal.key}','${g.id}');if(event.key==='Escape')cancelEditGrocery()">
                          <button class="btn btn-primary btn-sm" onclick="saveGrocery('${meal.key}','${g.id}')">Save</button>
                          <button class="btn btn-secondary btn-sm" onclick="cancelEditGrocery()">✕</button>
                        </li>`;
                    }
                    return `
                      <li class="grocery-item">
                        <span class="g-name">${h(g.item)}</span>
                        ${g.quantity ? `<span class="g-qty">${h(g.quantity)}</span>` : ''}
                        <button class="btn-edit" onclick="editGrocery('${meal.key}','${g.id}')" title="Edit">✎</button>
                        <button class="btn-x" onclick="removeGrocery('${meal.key}','${g.id}')" title="Remove">✕</button>
                      </li>`;
                  }).join('')}
                </ul>` : ''}
              <div class="add-row" style="margin-top:8px">
                <input id="g-name-${meal.key}" type="text" placeholder="Item name"
                  class="input-sm input-flex"
                  onkeydown="if(event.key==='Enter')addGrocery('${meal.key}')">
                <input id="g-qty-${meal.key}" type="text" placeholder="Qty"
                  class="input-sm input-qty"
                  onkeydown="if(event.key==='Enter')addGrocery('${meal.key}')">
                <button class="btn btn-primary btn-sm" onclick="addGrocery('${meal.key}')">Add</button>
              </div>
            </div>
            <div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--gray-100);text-align:right">
              <button class="btn btn-danger btn-sm" onclick="removeMeal('${meal.key}')">Remove meal</button>
            </div>
          </div>
        </div>`;
    }
    html += `</div>`;
  }

  html += `<button class="add-meal-btn" onclick="openAddMealModal()">+ Add meal</button>`;

  document.getElementById('meals-section').innerHTML = html;
  renderOverview(trip, meals);
  restoreFocus(focusId, focusVal);
}

// ── Render: Overview ──────────────────────────────────────
function renderOverview(trip, meals) {
  const el = document.getElementById('overview-card');
  if (!el) return;

  const mealData     = trip.mealData     || {};
  const participants = trip.participants  || [];
  const paidAmounts  = trip.paidAmounts  || {};
  const TYPES        = ['Breakfast', 'Lunch', 'Dinner'];

  // ── Build grocery aggregation per meal type ──
  const grocMap = {}; // type → { itemKey → { item, quantities[] } }
  for (const meal of meals) {
    const groceries = mealData[meal.key]?.groceries || [];
    if (!grocMap[meal.type]) grocMap[meal.type] = {};
    for (const g of groceries) {
      const k = g.item.trim().toLowerCase();
      if (!grocMap[meal.type][k]) grocMap[meal.type][k] = { item: g.item, quantities: [] };
      if (g.quantity) grocMap[meal.type][k].quantities.push(g.quantity);
    }
  }

  // ── Build meal counts per type ──
  const mealsByType = {};
  for (const meal of meals) {
    if (!mealsByType[meal.type]) mealsByType[meal.type] = [];
    mealsByType[meal.type].push(meal);
  }

  const activeTypes = TYPES.filter(t => mealsByType[t]?.length > 0);
  if (activeTypes.length === 0) { el.style.display = 'none'; return; }
  el.style.display = '';

  // ── Participation fractions: person → type → (joined/total)/N ──
  const N = participants.length;
  // fraction[p][t] = (meals_joined / total_meals_of_type) / N
  const fraction = {};
  for (const p of participants) {
    fraction[p] = {};
    for (const t of activeTypes) {
      const typeMeals = mealsByType[t] || [];
      const joined = typeMeals.filter(m => (mealData[m.key]?.joiners || []).includes(p)).length;
      fraction[p][t] = typeMeals.length > 0 ? (joined / typeMeals.length) / Math.max(N, 1) : 0;
    }
  }

  let html = `<div class="section-header"><span class="section-title">📊 Overview</span></div>`;

  // ── Grocery totals ──
  html += `<div class="section-label" style="margin-bottom:10px">Grocery totals</div>`;

  const typesWithGroceries = activeTypes.filter(t => grocMap[t] && Object.keys(grocMap[t]).length > 0);
  if (typesWithGroceries.length === 0) {
    html += `<p class="muted" style="margin-bottom:14px">No groceries added to any meal yet.</p>`;
  } else {
    for (const type of typesWithGroceries) {
      const items = Object.values(grocMap[type]);
      const paid  = paidAmounts[type] != null ? paidAmounts[type] : '';
      html += `
        <div class="overview-type-block">
          <div class="overview-type-header">
            <span class="badge badge-${type.toLowerCase()}">${type}</span>
            <div class="paid-row">
              <label>Paid:</label>
              <input id="paid-${type}" type="number" class="paid-input" min="0" step="0.01"
                value="${paid}" placeholder="0.00"
                onblur="setPaidAmount('${type}', this.value)"
                onkeydown="if(event.key==='Enter')this.blur()">
            </div>
          </div>
          <ul class="grocery-list">
            ${items.map(g => `
              <li class="grocery-item">
                <span class="g-name">${h(g.item)}</span>
                ${g.quantities.length ? `<span class="g-qty">${h(combineQuantity(g.quantities))}</span>` : ''}
              </li>`).join('')}
          </ul>
        </div>`;
    }
  }

  // ── Cost split ──
  if (N > 0) {
    const hasPaid = activeTypes.some(t => parseFloat(paidAmounts[t]) > 0);
    html += `<div class="section-label" style="margin-top:16px;margin-bottom:8px">Cost split</div>`;

    const splitTypes = activeTypes; // only types that have meals
    html += `<div class="split-table-wrap"><table class="split-table">
      <thead><tr>
        <th>Person</th>
        ${splitTypes.map(t => `<th style="text-align:right">${t.slice(0,1)}${t.slice(1,3).toLowerCase()}</th>`).join('')}
        ${hasPaid ? `<th style="text-align:right">Total</th>` : ''}
      </tr></thead>
      <tbody>`;

    let coveredTotal = 0;
    for (const p of participants) {
      let personTotal = 0;
      const cells = splitTypes.map(t => {
        const frac = fraction[p][t] || 0;
        const paid = parseFloat(paidAmounts[t]) || 0;
        const owed = frac * paid;
        personTotal += owed;
        const pct = Math.round(frac * 100);
        if (hasPaid && paid > 0) {
          return `<td class="split-cell"><span class="split-pct">${pct}%</span><span class="split-amt">${fmtAmt(owed)}</span></td>`;
        }
        return `<td class="split-cell">${pct}%</td>`;
      });
      coveredTotal += personTotal;
      html += `<tr>
        <td class="split-name">${h(p)}</td>
        ${cells.join('')}
        ${hasPaid ? `<td class="split-total-cell">${fmtAmt(personTotal)}</td>` : ''}
      </tr>`;
    }

    // Coverage note: total cost entered vs total assigned
    if (hasPaid) {
      const grandPaid = activeTypes.reduce((s, t) => s + (parseFloat(paidAmounts[t]) || 0), 0);
      const unassigned = grandPaid - coveredTotal;
      if (Math.abs(unassigned) > 0.005) {
        html += `<tr><td colspan="${splitTypes.length + (hasPaid ? 2 : 1)}" class="coverage-note">
          Unassigned: ${fmtAmt(unassigned)} (meals with no joiners)
        </td></tr>`;
      }
    }

    html += `</tbody></table></div>`;
  }

  el.innerHTML = html;
}

function restoreFocus(id, val) {
  if (!id) return;
  const el = document.getElementById(id);
  if (!el) return;
  el.focus();
  if (val !== undefined && el.tagName === 'INPUT') {
    el.value = val;
    el.setSelectionRange(val.length, val.length);
  }
}

// ── Event delegation (safe handling of user-provided names) ──
document.addEventListener('click', e => {
  const removeBtn = e.target.closest('.chip-remove');
  if (removeBtn) { removeParticipant(removeBtn.dataset.name); return; }

  const pill = e.target.closest('.pill[data-meal-key]');
  if (pill) {
    if (pill.dataset.role === 'cook') toggleCook(pill.dataset.mealKey, pill.dataset.name);
    else toggleJoiner(pill.dataset.mealKey, pill.dataset.name);
    return;
  }

  if (e.target.classList.contains('modal-overlay')) {
    if (e.target.id === 'modal-add-meal') closeAddMealModal();
    else if (e.target.id === 'modal-profile') closeProfileModal();
    else closeModal();
  }
});

// ── Boot ───────────────────────────────────────────────────
registerServiceWorker();

if (auth) {
  auth.onAuthStateChanged(user => {
    currentUser = user;
    if (user) {
      // Update profile button label
      const name = user.displayName || user.email.split('@')[0];
      document.getElementById('profile-btn').textContent = '👤 ' + name.split(' ')[0];
      // Ensure user doc exists
      db.collection('users').doc(user.uid).set({ displayName: user.displayName || name, email: user.email }, { merge: true });
      // Ask for notification permission once (after login)
      if (Notification.permission === 'default') {
        setTimeout(() => enableNotifications(), 2000);
      } else if (Notification.permission === 'granted') {
        enableNotifications(); // refresh token silently
      }
      initForegroundMessaging();
      const initHash = location.hash.slice(1) || '/';
      navigate(initHash);
    } else {
      currentUser = null;
      showPage('page-auth');
      setHeaderBtns({});
      document.getElementById('header-title').textContent = 'Trip Meal Planner';
    }
  });
} else {
  // Firebase not configured — show setup banner on trips page
  showPage('page-trips');
  document.getElementById('header-title').textContent = 'Trip Meal Planner';
  loadTripsList();
}
</script>
</body>
</html>
